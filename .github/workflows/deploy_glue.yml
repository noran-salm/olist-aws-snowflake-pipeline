name: Deploy Glue ETL Script

on:
  push:
    branches: [main]
    paths:
      - 'processing/olist_etl_script.py'
      - 'ingestion/pipeline_orchestrator.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Validate Glue script syntax
        run: python3 -m py_compile processing/olist_etl_script.py && echo "Syntax OK"

      - name: Deploy Glue script to S3
        run: |
          aws s3 cp processing/olist_etl_script.py \
            s3://olist-lake-516671521715/scripts/olist_etl_script.py \
            --sse AES256
          echo "Glue script deployed"

      - name: Deploy orchestrator Lambda
        run: |
          cd lambda_function
          zip -j orchestrator.zip pipeline_orchestrator.py
          unzip -l orchestrator.zip
          aws lambda update-function-code \
            --function-name olist-pipeline-orchestrator \
            --zip-file fileb://orchestrator.zip
          aws lambda wait function-updated \
            --function-name olist-pipeline-orchestrator
          echo "Lambda deployed"

      - name: Smoke test Lambda
        run: |
          PAYLOAD=$(python3 -c "import base64,json; print(base64.b64encode(json.dumps({'action':'validate_s3','run_id':'ci-smoke'}).encode()).decode())")
          aws lambda invoke \
            --function-name olist-pipeline-orchestrator \
            --payload "$PAYLOAD" /tmp/r.json
          cat /tmp/r.json
          python3 -c "import json; d=json.load(open('/tmp/r.json')); exit(0 if d.get('status')=='VALID' else 1)"
          echo "Smoke test PASSED"

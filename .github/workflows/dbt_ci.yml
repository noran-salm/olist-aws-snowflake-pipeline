name: dbt CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'transformation/**'
      - '.github/workflows/dbt_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'transformation/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-test:
    name: dbt compile + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.4

      - name: Write profiles.yml
        run: |
          cat > transformation/profiles.yml << PROFILE
          dbt_olist:
            target: ci
            outputs:
              ci:
                type: snowflake
                account:   "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user:      "${{ secrets.SNOWFLAKE_USER }}"
                password:  "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role:      SYSADMIN
                database:  OLIST_DW
                warehouse: OLIST_WH
                schema:    STAGING
                threads:   4
                client_session_keep_alive: false
                query_tag: "dbt_ci"
          PROFILE

      - name: dbt debug
        working-directory: transformation
        env:
          DBT_PROFILES_DIR: .
        run: dbt debug

      - name: dbt compile
        working-directory: transformation
        env:
          DBT_PROFILES_DIR: .
        run: dbt compile

      - name: dbt test (sources + staging)
        working-directory: transformation
        env:
          DBT_PROFILES_DIR: .
        run: dbt test --select source:olist_raw staging

      - name: Upload dbt logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-logs
          path: transformation/logs/
          retention-days: 7

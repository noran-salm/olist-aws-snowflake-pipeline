version: 2

sources:
  - name: olist_raw
    database: OLIST_DW
    schema: RAW
    tables:
      - name: fct_orders
        config:
          freshness:
            warn_after:  {count: 720, period: hour}
            error_after: {count: 1440, period: hour}
        loaded_at_field: "order_purchase_timestamp"
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]
          - name: customer_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: seller_id
            tests: [not_null]

      - name: dim_customers
        columns:
          - name: customer_id
            tests: [not_null, unique]

      - name: dim_products
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: dim_sellers
        columns:
          - name: seller_id
            tests: [not_null, unique]

models:
  - name: stg_orders
    description: "Staging view over raw fct_orders"
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered','shipped','processing','canceled',
                       'unavailable','invoiced','approved','created']
      - name: item_price
        tests: [not_null]
      - name: order_item_revenue
        tests: [not_null]

  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_products
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_sellers
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: dim_customers
    description: "Customer dimension enriched with LTV and region"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['high_value','mid_value','low_value']
      - name: total_orders
        tests: [not_null]
      - name: lifetime_revenue
        tests: [not_null]

  - name: dim_products
    description: "Product dimension with revenue tier"
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: revenue_tier
        tests:
          - accepted_values:
              values: ['top','mid','tail']

  - name: dim_sellers
    description: "Seller dimension with GMV tier"
    columns:
      - name: seller_id
        tests: [not_null, unique]
      - name: seller_tier
        tests:
          - accepted_values:
              values: ['platinum','gold','silver','bronze']
      - name: late_delivery_rate_pct
        tests: [not_null]

  - name: fct_orders
    description: "Fact table at order-item grain — incremental"
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: item_price
        tests: [not_null]
      - name: order_item_revenue
        tests: [not_null]
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered','shipped','processing','canceled',
                       'unavailable','invoiced','approved','created']

  - name: fct_monthly_revenue
    columns:
      - name: order_year_month
        tests: [not_null]
      - name: revenue_brl
        tests: [not_null]

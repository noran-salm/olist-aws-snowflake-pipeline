dbt_olist:
  target: dev
  outputs:
    dev:
      type:      snowflake
      account:   "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user:      "{{ env_var('SNOWFLAKE_USER') }}"
      password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      "{{ env_var('SNOWFLAKE_ROLE', 'SYSADMIN') }}"
      database:  "{{ env_var('SNOWFLAKE_DATABASE', 'OLIST_DW') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'OLIST_WH') }}"
      schema:    "{{ env_var('SNOWFLAKE_SCHEMA', 'STAGING') }}"
      threads:   4
      client_session_keep_alive: false
      query_tag: "dbt_olist_dev"
